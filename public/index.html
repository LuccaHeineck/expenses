<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle Financeiro</title>
  <style>

  </style>
</head>
<body>
  <main class="container">
    <h1>Listagem de Lancamentos</h1>
    <p>Despesas e receitas cadastradas no banco PostgreSQL.</p>
    <div id="error" class="error" hidden></div>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Descricao</th>
          <th>Data</th>
          <th>Valor</th>
          <th>Tipo</th>
          <th>Situacao</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </main>

  <script>
    const tbody = document.getElementById("tbody");
    const errorBox = document.getElementById("error");

    function formatDate(dateValue) {
      const date = new Date(dateValue);
      return new Intl.DateTimeFormat("pt-BR").format(date);
    }

    function formatCurrency(value) {
      return new Intl.NumberFormat("pt-BR", {
        style: "currency",
        currency: "BRL"
      }).format(Number(value));
    }

    async function loadLancamentos() {
      try {
        const response = await fetch("/api/lancamentos");

        if (!response.ok) {
          throw new Error("Falha ao carregar dados");
        }

        const rows = await response.json();

        tbody.innerHTML = rows.map((row) => `
          <tr>
            <td>${row.id}</td>
            <td>${row.descricao}</td>
            <td>${formatDate(row.data_lancamento)}</td>
            <td>${formatCurrency(row.valor)}</td>
            <td class="tipo-${row.tipo_lancamento}">${row.tipo_lancamento}</td>
            <td class="situacao-${row.situacao}">${row.situacao}</td>
          </tr>
        `).join("");
      } catch (error) {
        errorBox.hidden = false;
        errorBox.textContent = "Nao foi possivel carregar os lancamentos.";
      }
    }

    loadLancamentos();
  </script>
</body>
</html>
