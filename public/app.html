<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Controle de Lançamentos</title>
  <style>
    :root {
      --bg: #f4f7f5;
      --bg-shade: #dce8e2;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #52606d;
      --line: #d9e2ec;
      --primary: #12726b;
      --primary-hover: #0e5e59;
      --secondary: #334e68;
      --secondary-hover: #243b53;
      --danger: #b42318;
      --danger-hover: #911b11;
      --success: #1f8a62;
      --shadow: 0 12px 32px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
      font-family: "Segoe UI", "Gill Sans", "Trebuchet MS", sans-serif;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 12% 8%, rgba(18, 114, 107, 0.18), transparent 42%),
        radial-gradient(circle at 88% 0%, rgba(51, 78, 104, 0.15), transparent 34%),
        linear-gradient(180deg, var(--bg), var(--bg-shade));
      color: var(--text);
      min-height: 100vh;
    }

    main {
      width: min(1080px, 94vw);
      margin: 28px auto 40px;
      display: grid;
      gap: 18px;
    }

    .header,
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      background: linear-gradient(130deg, #ffffff 0%, #f3faf7 54%, #edf4fa 100%);
      position: relative;
      overflow: hidden;
    }

    .header::after {
      content: "";
      position: absolute;
      width: 240px;
      height: 240px;
      right: -90px;
      top: -120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(18, 114, 107, 0.24), transparent 68%);
      pointer-events: none;
    }

    .title-group {
      position: relative;
      z-index: 1;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    h1, h2 {
      margin: 0;
    }

    h1 {
      font-size: clamp(1.35rem, 2.3vw, 1.8rem);
      letter-spacing: 0.02em;
    }

    h2 {
      font-size: 1.1rem;
      margin-bottom: 12px;
    }

    #user {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 600;
      background: #f5fbf8;
      border: 1px solid #d7ebe2;
      border-radius: 999px;
      padding: 8px 12px;
      position: relative;
      z-index: 1;
    }

    form {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
    }

    form input,
    form select,
    form button {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 10px 12px;
      font-size: 0.92rem;
      background: #fbfdff;
      color: var(--text);
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(18, 114, 107, 0.14);
    }

    input[name="descricao"] {
      grid-column: span 2;
    }

    input[name="email"] {
      grid-column: span 2;
    }

    button {
      border: none;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.92rem;
      transition: transform 120ms ease, filter 120ms ease, background-color 120ms ease;
    }

    button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      filter: brightness(1.02);
    }

    #logout {
      width: auto;
      background: var(--secondary);
      padding-inline: 16px;
      position: relative;
      z-index: 1;
    }

    #logout:hover {
      background: var(--secondary-hover);
    }

    .table-wrap {
      overflow: hidden;
    }

    #table td input,
    #table td select {
      width: 100%;
      min-width: 0;
      border-radius: 6px;
      border: 1px solid var(--line);
      padding: 6px 8px;
      font-size: 0.88rem;
      background: #fbfdff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      white-space: normal;
      word-break: break-word;
    }

    th {
      color: var(--muted);
      font-weight: 600;
      background: #eef6f2;
      font-size: 0.88rem;
      letter-spacing: 0.01em;
    }

    #table td:last-child {
      white-space: nowrap;
      width: 170px;
    }

    #table td:last-child button {
      width: auto;
      padding: 6px 10px;
      font-size: 0.82rem;
      margin-right: 6px;
      margin-top: 4px;
    }

    #table td:last-child button:last-child {
      margin-right: 0;
    }

    .edit,
    .cancel {
      background: var(--secondary);
    }

    .edit:hover,
    .cancel:hover {
      background: var(--secondary-hover);
    }

    .save {
      background: var(--success);
    }

    .save:hover {
      background: #166a4b;
    }

    .del {
      background: var(--danger);
    }

    .del:hover {
      background: var(--danger-hover);
    }

    @media (max-width: 900px) {
      form {
        grid-template-columns: 1fr 1fr;
      }

      input[name="descricao"] {
        grid-column: span 2;
      }

      input[name="email"] {
        grid-column: span 2;
      }

      main {
        width: min(100%, 96vw);
        margin-top: 18px;
      }

      .header,
      .card {
        border-radius: 14px;
        padding: 14px;
      }

      .header {
        align-items: flex-start;
      }

      #user {
        width: 100%;
      }

      #logout {
        width: 100%;
      }

      #table thead {
        display: none;
      }

      #table,
      #table tbody,
      #table tr,
      #table td {
        display: block;
        width: 100%;
      }

      #table tr {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        margin-bottom: 10px;
        background: #fbfefd;
      }

      #table td {
        border: none;
        padding: 7px 0;
        display: grid;
        grid-template-columns: 92px 1fr;
        gap: 8px;
        align-items: center;
      }

      #table td::before {
        content: attr(data-label);
        color: var(--muted);
        font-size: 0.76rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      #table td:last-child {
        width: 100%;
        white-space: normal;
        grid-template-columns: 1fr;
      }

      #table td:last-child::before {
        margin-bottom: 4px;
      }

      #table td:last-child button {
        width: calc(50% - 4px);
        margin-right: 8px;
      }

      #table td:last-child button:nth-child(3),
      #table td:last-child button:last-child {
        margin-right: 0;
      }
    }

    @media (max-width: 560px) {
      form {
        grid-template-columns: 1fr;
      }

      input[name="descricao"] {
        grid-column: span 1;
      }

      input[name="email"] {
        grid-column: span 1;
      }

      #table td {
        grid-template-columns: 1fr;
      }

      #table td::before {
        margin-bottom: 2px;
      }

      #table td:last-child button {
        width: 100%;
        margin-right: 0;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="header">
      <div class="title-group">
        <h1>Controle Financeiro</h1>
        <p class="subtitle">Cadastre, edite e acompanhe suas receitas e despesas</p>
      </div>
      <div id="user"></div>
      <button id="logout">Sair</button>
    </section>

    <section class="card">
      <h2>Novo lançamento</h2>
      <form id="form">
        <input name="descricao" placeholder="Descrição" required />
        <input name="data_lancamento" type="date" required />
        <input name="valor" type="number" step="0.01" required />
        <input name="email" type="email" placeholder="Email para receber o aviso" required />
        <select name="tipo_lancamento">
          <option value="RECEITA">RECEITA</option>
          <option value="DESPESA">DESPESA</option>
        </select>
        <select name="situacao">
          <option value="PAGO">PAGO</option>
          <option value="PENDENTE">PENDENTE</option>
        </select>
        <button type="submit">Salvar</button>
      </form>
    </section>

    <section class="card table-wrap">
      <h2>Lista</h2>
      <table id="table">
        <thead><tr><th>ID</th><th>Descrição</th><th>Data</th><th>Valor</th><th>Tipo</th><th>Situação</th><th>Ações</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
