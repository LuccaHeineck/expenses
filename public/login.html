<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Login</title>
</head>
<body>
  <h1>Login</h1>
  <form id="loginForm">
    <div>
      <label>Login: <input name="login" required /></label>
    </div>
    <div>
      <label>Senha: <input name="senha" type="password" required /></label>
    </div>
    <button type="submit">Entrar</button>
  </form>
  <div id="msg"></div>
  <script src="/app.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const msg = document.getElementById('msg');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(form);
      const body = { login: fd.get('login'), senha: fd.get('senha') };
      try {
        const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body), credentials: 'same-origin' });
        if (!res.ok) {
          const err = await res.json();
          msg.textContent = err.error || 'Erro';
          return;
        }
        const user = await res.json();
        sessionStorage.setItem('user', JSON.stringify(user));
        window.location.href = '/app';
      } catch (err) {
        msg.textContent = 'Erro de rede';
      }
    });
  </script>
</body>
</html>
