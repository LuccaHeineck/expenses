<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>
  <style>
    :root {
      --bg: #f8f5f1;
      --card: #ffffff;
      --text: #2a211d;
      --muted: #76645a;
      --line: #decfc5;
      --primary: #0f766e;
      --primary-hover: #0d5f59;
      --danger: #a11919;
    }

    * {
      box-sizing: border-box;
      font-family: "Verdana", "Tahoma", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
    }

    .card {
      width: min(420px, 92vw);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 8px 18px rgba(44, 33, 29, 0.08);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 1.5rem;
      font-weight: 700;
    }

    form {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: none;
      font-size: 0.95rem;
      color: var(--text);
      background: #fff;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
    }

    button {
      margin-top: 6px;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      color: white;
      background: var(--primary);
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: var(--primary-hover);
    }

    #msg {
      margin-top: 12px;
      min-height: 20px;
      color: var(--danger);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Login</h1>
    <form id="loginForm">
      <div>
        <label>Login: <input name="login" required /></label>
      </div>
      <div>
        <label>Senha: <input name="senha" type="password" required /></label>
      </div>
      <button type="submit">Entrar</button>
    </form>
    <div id="msg"></div>
  </main>
  <script src="/app.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const msg = document.getElementById('msg');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(form);
      const body = { login: fd.get('login'), senha: fd.get('senha') };
      try {
        const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body), credentials: 'same-origin' });
        if (!res.ok) {
          const err = await res.json();
          msg.textContent = err.error || 'Erro';
          return;
        }
        const user = await res.json();
        sessionStorage.setItem('user', JSON.stringify(user));
        window.location.href = '/app';
      } catch (err) {
        msg.textContent = 'Erro de rede';
      }
    });
  </script>
</body>
</html>
